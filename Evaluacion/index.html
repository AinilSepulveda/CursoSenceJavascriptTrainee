<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="../bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- CSS de jQuery UI (obligatorio en head) -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
  <link rel="stylesheet" href="assets/css/styles.css">
  <title> Evaluación de modulo </title>

<body>
  <div id="listaProductos" class="row g-3 mt-4 auto"></div>

  <div class="container mt-4">
    
    <div id="favoriteItems" class="carousel-indicators"> </div>
    
    <div id="carouselDestacados" class="carousel slide mt-4" data-bs-ride="carousel">

      <div class="carousel-inner" id="carouselContent"> </div>

      <button class="carousel-control-prev" type="button"  data-bs-slide="prev" data-bs-target="#carouselDestacados">

      <button class="carousel-control-next" type="button"  data-bs-slide="next" data-bs-target="#carouselDestacados">
      <span class="carousel-control-next-icon"></span>
      </button>
    </div>

  </div>
  
  <div id="toastMsg" class="toast-msg hidden"></div>
